<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #111;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .header h1 { color: #fff; font-size: 18px; }
        .status {
            background: #2a2a2a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .status.online { color: #4CAF50; }
        .status.offline { color: #888; }
        .menu-btn {
            background: #2a2a2a;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }
        .room-bar {
            background: #0f0f0f;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .room-name {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .actions-bar {
            background: #0f0f0f;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .action {
            background: #1a1a1a;
            border: none;
            color: #ccc;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .action:active {
            background: #4CAF50;
            color: white;
            transform: scale(0.95);
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }
        .message-own {
            background: #4CAF50;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-other {
            background: #1e1e1e;
            color: #ddd;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-system {
            background: #1a1a1a;
            color: #f39c12;
            align-self: center;
            font-size: 11px;
            padding: 6px 12px;
            text-align: center;
        }
        .message-action {
            background: #2a1a3a;
            color: #c9a0ff;
            align-self: center;
            font-style: italic;
            font-size: 12px;
            text-align: center;
        }
        .input-area {
            background: #0f0f0f;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1a1a1a;
            border: none;
            padding: 12px 16px;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .input-area button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a1a;
            border-radius: 16px;
            width: 90%;
            max-width: 350px;
            padding: 20px;
        }
        .modal-input {
            width: 100%;
            background: #2a2a2a;
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            margin: 10px 0;
            outline: none;
        }
        .modal-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-btn.secondary { background: #2a2a2a; }
        .action-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #4CAF50;
            padding: 20px 30px;
            border-radius: 50px;
            font-size: 18px;
            z-index: 2000;
            animation: fadeOut 0.8s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #4CAF50; }
        button { touch-action: manipulation; }
    </style>
</head>
<body>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; text-align: center; margin-bottom: 20px;">Global Messenger</h3>
        <input type="text" id="loginName" class="modal-input" placeholder="Ваш ник" autocomplete="off">
        <input type="text" id="loginRoom" class="modal-input" placeholder="Название комнаты (общий секрет)" autocomplete="off">
        <button class="modal-btn" id="enterBtn">Войти</button>
        <div style="text-align: center; margin-top: 15px; color: #666; font-size: 11px;">
            Чтобы общаться с конкретным человеком:<br>
            придумайте уникальное название комнаты и скажите ему
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h1>Global Messenger</h1>
        <div style="display: flex; gap: 10px;">
            <div class="status offline" id="statusBadge">● Офлайн</div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </div>
    </div>
    
    <div class="room-bar">
        Комната: <span class="room-name" id="roomName">--</span>
        <span style="color:#666; font-size:11px; margin-left:10px;">(нажмите чтобы сменить)</span>
    </div>
    
    <div class="actions-bar">
        <button class="action" data-action="обнял">Обнять</button>
        <button class="action" data-action="поцеловал">Поцеловать</button>
        <button class="action" data-action="пожал руку">Пожать руку</button>
        <button class="action" data-action="дал пять">Дал пять</button>
        <button class="action" data-action="помахал">Помахать</button>
    </div>
    
    <div class="chat-area" id="chatArea">
        <div class="message message-system">Добро пожаловать в Global Messenger</div>
        <div class="message message-system">Ожидание подключения...</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
        <button id="sendBtn">Отправить</button>
    </div>
</div>

<script>
    let ws = null;
    let myName = null;
    let myRoom = null;
    let reconnectAttempts = 0;
    
    const SERVER_URL = 'wss://ws.postman-echo.com/raw';
    
    function showAuth() {
        document.getElementById('authModal').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
    }
    
    function hideAuth() {
        document.getElementById('authModal').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('roomName').innerText = myRoom;
        addSystemMessage('Ваш ник: ' + myName);
        addSystemMessage('Комната: ' + myRoom);
        addSystemMessage('Скажите другу название комнаты и зайдите в неё же');
    }
    
    function updateStatus(online, text) {
        const badge = document.getElementById('statusBadge');
        badge.innerText = text || (online ? '● Онлайн' : '● Офлайн');
        badge.className = online ? 'status online' : 'status offline';
    }
    
    function connect() {
        try {
            ws = new WebSocket(SERVER_URL);
            
            ws.onopen = () => {
                updateStatus(true, '● Онлайн');
                addSystemMessage('Подключено к глобальному серверу');
                reconnectAttempts = 0;
            };
            
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.room === myRoom && data.name !== myName) {
                        if (data.type === 'chat') {
                            addMessage(data.text, 'other', data.name);
                        } else if (data.type === 'action') {
                            const actionText = data.name + ' ' + data.action + ' вас';
                            addActionMessage(actionText);
                            showActionPopup(actionText);
                        }
                    }
                } catch(err) {}
            };
            
            ws.onerror = () => {
                updateStatus(false, '● Ошибка');
            };
            
            ws.onclose = () => {
                updateStatus(false, '● Переподключение');
                addSystemMessage('Соединение потеряно. Переподключение...');
                
                reconnectAttempts++;
                const delay = Math.min(5000, reconnectAttempts * 1000);
                setTimeout(connect, delay);
            };
        } catch(e) {
            addSystemMessage('Ошибка: ' + e.message);
            setTimeout(connect, 3000);
        }
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addSystemMessage('Нет соединения с сервером');
            return;
        }
        
        const msg = JSON.stringify({
            type: 'chat',
            name: myName,
            room: myRoom,
            text: text
        });
        
        ws.send(msg);
        addMessage(text, 'own');
        input.value = '';
    }
    
    function sendAction(action) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addSystemMessage('Нет соединения с сервером');
            return;
        }
        
        const msg = JSON.stringify({
            type: 'action',
            name: myName,
            room: myRoom,
            action: action
        });
        
        ws.send(msg);
    }
    
    function addMessage(text, type, fromName = null) {
        const chat = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message message-' + type;
        
        if (type === 'other' && fromName) {
            div.innerText = fromName + ': ' + text;
        } else {
            div.innerText = text;
        }
        
        chat.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }
    
    function addSystemMessage(text) {
        const chat = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message message-system';
        div.innerText = text;
        chat.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }
    
    function addActionMessage(text) {
        const chat = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message message-action';
        div.innerText = '⚡ ' + text + ' ⚡';
        chat.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }
    
    function showActionPopup(text) {
        const popup = document.createElement('div');
        popup.className = 'action-notification';
        popup.innerText = text;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 800);
    }
    
    function changeRoom() {
        const newRoom = prompt('Введите новое название комнаты:', myRoom);
        if (newRoom && newRoom.trim()) {
            myRoom = newRoom.trim();
            document.getElementById('roomName').innerText = myRoom;
            addSystemMessage('Вы перешли в комнату: ' + myRoom);
            addSystemMessage('Теперь вы видите только сообщения из этой комнаты');
        }
    }
    
    function openMenu() {
        let menu = document.querySelector('.menu-modal');
        if (menu) menu.remove();
        
        menu = document.createElement('div');
        menu.className = 'modal menu-modal';
        menu.style.display = 'flex';
        menu.innerHTML = '<div class="modal-content">' +
            '<div class="modal-btn" onclick="changeRoom()">Сменить комнату</div>' +
            '<div class="modal-btn secondary" onclick="location.reload()">Выйти / Сменить ник</div>' +
            '<div class="modal-btn secondary" onclick="this.closest(\'.modal\').remove()">Закрыть</div>' +
            '</div>';
        document.body.appendChild(menu);
    }
    
    document.getElementById('enterBtn').onclick = () => {
        const name = document.getElementById('loginName').value.trim();
        const room = document.getElementById('loginRoom').value.trim();
        
        if (!name) {
            alert('Введите ваш ник');
            return;
        }
        if (!room) {
            alert('Введите название комнаты');
            return;
        }
        
        myName = name;
        myRoom = room;
        hideAuth();
        connect();
    };
    
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };
    document.getElementById('menuBtn').onclick = openMenu;
    document.getElementById('roomName').onclick = changeRoom;
    
    document.querySelectorAll('.action').forEach(btn => {
        btn.onclick = (e) => {
            e.preventDefault();
            sendAction(btn.getAttribute('data-action'));
        };
    });
    
    showAuth();
</script>

</body>
</html>
